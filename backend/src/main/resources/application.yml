spring:
  application:
    name: smarthire-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smarthire}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:5MB}
  jackson:
    time-zone: Asia/Shanghai
  cache:
    type: ${SPRING_CACHE_TYPE:redis}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.smarthire: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:smarthire-dev-secret-key-at-least-32-bytes-long}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:86400}
  storage:
    resume-dir: ${RESUME_STORAGE_DIR:uploads/resumes}
    resume-max-size-bytes: ${RESUME_MAX_SIZE_BYTES:5242880}
  messaging:
    notification:
      exchange: ${APP_NOTIFICATION_EXCHANGE:smarthire.notification}
      queue: ${APP_NOTIFICATION_QUEUE:smarthire.notification.persist}
      dead-letter-exchange: ${APP_NOTIFICATION_DEAD_LETTER_EXCHANGE:smarthire.notification.dlx}
      dead-letter-queue: ${APP_NOTIFICATION_DEAD_LETTER_QUEUE:smarthire.notification.persist.dlq}
  jobs:
    expiration:
      enabled: ${APP_JOBS_EXPIRATION_ENABLED:true}
      cron: ${APP_JOBS_EXPIRATION_CRON:0 */5 * * * *}
      zone: ${APP_JOBS_EXPIRATION_ZONE:Asia/Shanghai}
